<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO₂ Datu Monitorings | Izvēlieties Skatu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #2e7d32 0%, #388e3c 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            font-weight: 300;
        }

        .choices {
            padding: 50px 40px;
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .choice-card {
            flex: 1;
            min-width: 250px;
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #e0e0e0;
            text-decoration: none;
            display: block;
        }

        .choice-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(46, 125, 50, 0.15);
            border-color: #2e7d32;
        }

        .icon {
            font-size: 4em;
            margin-bottom: 20px;
            display: inline-block;
        }

        .choice-card h2 {
            color: #1b5e20;
            font-size: 1.8em;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .choice-card p {
            color: #666;
            font-size: 1em;
            line-height: 1.5;
        }

        .footer {
            background: #f1f8e9;
            padding: 20px;
            text-align: center;
            color: #558b2f;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .choices {
                padding: 30px 20px;
                gap: 20px;
            }
            
            .choice-card {
                min-width: 100%;
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 CO₂ Vides Monitorings</h1>
            <p>Izvēlieties, kā vēlaties skatīt datus</p>
        </div>
        
        <div class="choices">
            <a href="/graph" class="choice-card">
                <div class="icon">📊</div>
                <h2>Grafika Skats</h2>
                <p>Vizualizējiet CO₂ līmeni ar interaktīvu grafiku un kopsavilkuma statistiku</p>
            </a>
            
            <a href="/data" class="choice-card">
                <div class="icon">📋</div>
                <h2>Datu Skats</h2>
                <p>Skatiet datus tabulas formātā ar filtriem, kārtošanu un detalizētu statistiku</p>
            </a>
        </div>
        
        <div class="footer">
            <p>CO₂ mērījumi daļās uz miljonu (ppm)</p>
        </div>
    </div>
</body>
</html>
